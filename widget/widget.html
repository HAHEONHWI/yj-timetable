<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YJ Timetable Widget</title>
    <link rel="stylesheet" href="./widget.css" />
  </head>
  <body>
    <div class="widget">
      <header class="widget-head">
        <div class="drag-region">
          <img src="../assets/logo.png" alt="" />
          <div>
            <p id="dateLabel">오늘 시간표</p>
            <h1>용정 시간표</h1>
          </div>
        </div>
        <div class="controls">
          <label class="toggle">
            <input id="themeToggle" type="checkbox" />
            <span>라이트</span>
          </label>
          <label class="toggle">
            <input id="pinToggle" type="checkbox" />
            <span>위에 고정</span>
          </label>
          <label class="toggle">
            <input id="startupToggle" type="checkbox" />
            <span>부팅 실행</span>
          </label>
          <label class="opacity-control" for="opacityRange">
            <span>투명도</span>
            <input id="opacityRange" type="range" min="55" max="100" step="5" />
          </label>
          <button id="refreshButton" type="button">새로고침</button>
          <button id="closeButton" class="icon-button" type="button" aria-label="닫기">×</button>
        </div>
      </header>

      <main>
        <div id="status" class="status">시간표를 불러오는 중입니다.</div>
        <div id="schedule" class="week-shell"></div>
      </main>
    </div>

    <script src="../src/supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../src/storage.js"></script>
    <script src="./widget.js"></script>
  </body>
</html>
