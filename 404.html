<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - 페이지를 찾을 수 없습니다</title>
    <link rel="icon" href="/assets/logo.png" />
    <style>
      :root {
        --bg: #070b12;
        --panel: #111827;
        --panel-soft: #162033;
        --line: #2b3648;
        --ink: #f1f5f9;
        --muted: #9aa8bd;
        --accent: #14b8a6;
        --accent-strong: #0f766e;
        --blue: #3b82f6;
        --warning: #f59e0b;
        font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 16%, rgba(20, 184, 166, 0.18), transparent 28%),
          radial-gradient(circle at 82% 22%, rgba(59, 130, 246, 0.14), transparent 26%),
          linear-gradient(180deg, #080d15 0%, var(--bg) 100%);
        color: var(--ink);
      }

      a {
        color: inherit;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 18px clamp(18px, 4vw, 56px);
        border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        background: rgba(7, 11, 18, 0.78);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
        text-decoration: none;
      }

      .brand img {
        width: 48px;
        height: 48px;
        object-fit: contain;
      }

      .eyebrow,
      .brand p {
        margin: 0;
        color: var(--accent);
        font-size: 13px;
        font-weight: 900;
      }

      .brand h1 {
        margin: 2px 0 0;
        font-size: 22px;
        letter-spacing: 0;
      }

      nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      nav a,
      .button {
        min-height: 40px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(17, 24, 39, 0.82);
        color: var(--ink);
        padding: 0 14px;
        font-size: 14px;
        font-weight: 900;
        text-decoration: none;
      }

      nav a:hover,
      .button:hover {
        border-color: rgba(20, 184, 166, 0.7);
        background: rgba(22, 32, 51, 0.94);
      }

      main {
        min-height: calc(100vh - 85px);
        display: grid;
        place-items: center;
        padding: clamp(28px, 6vw, 72px) 18px;
      }

      .shell {
        width: min(980px, 100%);
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 18px;
        align-items: stretch;
      }

      .hero,
      .quick-links {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(17, 24, 39, 0.88);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
      }

      .hero {
        padding: clamp(28px, 5vw, 54px);
      }

      .badge {
        width: fit-content;
        border: 1px solid rgba(245, 158, 11, 0.45);
        border-radius: 999px;
        background: rgba(245, 158, 11, 0.1);
        color: #fcd34d;
        padding: 7px 12px;
        font-size: 13px;
        font-weight: 900;
      }

      .code {
        margin: 24px 0 8px;
        color: var(--ink);
        font-size: clamp(76px, 13vw, 138px);
        line-height: 0.9;
        font-weight: 950;
        letter-spacing: 0;
      }

      h2 {
        margin: 0;
        font-size: clamp(28px, 4vw, 46px);
        letter-spacing: 0;
      }

      .hero p {
        max-width: 610px;
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.65;
        font-weight: 700;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 28px;
      }

      .button.primary {
        border-color: var(--accent-strong);
        background: var(--accent-strong);
        color: #ecfeff;
      }

      .button.secondary {
        border-color: rgba(59, 130, 246, 0.55);
      }

      .quick-links {
        display: grid;
        align-content: center;
        gap: 12px;
        padding: clamp(22px, 4vw, 34px);
      }

      .quick-links h3 {
        margin: 0 0 4px;
        font-size: 20px;
      }

      .link-card {
        display: grid;
        gap: 4px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 8px;
        background: rgba(8, 13, 21, 0.55);
        padding: 14px;
        text-decoration: none;
      }

      .link-card strong {
        font-size: 15px;
      }

      .link-card span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .link-card:hover {
        border-color: rgba(20, 184, 166, 0.7);
        background: rgba(15, 118, 110, 0.14);
      }

      @media (max-width: 820px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        nav {
          width: 100%;
          justify-content: stretch;
        }

        nav a {
          flex: 1 1 42%;
        }

        .shell {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/" aria-label="홈으로 이동">
        <img src="/assets/home-banner.png" alt="" />
        <div>
          <p>용정 전용 시간표</p>
          <h1>용정 시간표</h1>
        </div>
      </a>

      <nav aria-label="주요 페이지">
        <a href="/">조회</a>
        <a href="/slide">슬라이드쇼</a>
        <a href="/download">다운로드</a>
        <a href="/admin">관리자</a>
      </nav>
    </header>

    <main>
      <section class="shell" aria-labelledby="pageTitle">
        <article class="hero">
          <div class="badge">Page Not Found</div>
          <div class="code">404</div>
          <h2 id="pageTitle">찾는 페이지가 없어요</h2>
          <p>
            주소가 바뀌었거나 더 이상 사용하지 않는 링크일 수 있습니다.
            아래 바로가기로 필요한 화면으로 이동해 주세요.
          </p>
          <div class="actions">
            <a class="button primary" href="/">시간표 조회로 이동</a>
            <a class="button secondary" href="javascript:history.back()">이전 페이지</a>
          </div>
        </article>

        <aside class="quick-links" aria-label="빠른 이동">
          <p class="eyebrow">바로가기</p>
          <h3>필요한 화면으로 바로 이동</h3>
          <a class="link-card" href="/slide">
            <strong>슬라이드쇼</strong>
            <span>전자칠판에 자동 슬라이드 화면 표시</span>
          </a>
          <a class="link-card" href="/download">
            <strong>다운로드</strong>
            <span>Windows 위젯과 전자칠판 APK 설치 파일</span>
          </a>
          <a class="link-card" href="/admin">
            <strong>관리자</strong>
            <span>시간표 변경, 행사, 안내사항 관리</span>
          </a>
          <a class="link-card" href="/widget/widget.html">
            <strong>위젯 화면</strong>
            <span>브라우저에서 Windows 위젯 화면 확인</span>
          </a>
        </aside>
      </section>
    </main>
  </body>
</html>
